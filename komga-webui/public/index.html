<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Komga</title>
    <link id="favicon" rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <meta name="msapplication-TileColor" content="#08397f">
    <meta name="msapplication-TileImage" content="/mstile-144x144.png">
    <link rel="manifest" href="/manifest.json">
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.resourceBaseUrl = /*[(<%="$"%>{"'" + baseUrl + "'"})]*/ '/'
        /*]]>*/
    </script>
    <script>
        (function () {
            const favicon = document.getElementById('favicon')
            if (!favicon) return

            const baseUrl = window.resourceBaseUrl || '/'
            const normalizedBaseUrl = baseUrl.endsWith('/') ? baseUrl : `${baseUrl}/`
            const logoUrl = `${normalizedBaseUrl}api/v1/logo`

            fetch(logoUrl, {method: 'HEAD', cache: 'no-store'})
                .then((response) => {
                    if (!response.ok) return
                    const cacheTag = response.headers.get('etag') || response.headers.get('last-modified')
                    favicon.href = cacheTag ? `${logoUrl}?v=${encodeURIComponent(cacheTag)}` : logoUrl
                })
                .catch(() => {
                    // Keep default favicon when custom logo is not available.
                })
        })()
    </script>
</head>
<body>
<noscript>
    <strong>We're sorry but Komga doesn't work properly without JavaScript enabled. Please enable it to
        continue.</strong>
</noscript>
<div id="app"></div>
<!-- built files will be auto injected -->
</body>
</html>
